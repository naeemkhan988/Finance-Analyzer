<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered financial document analysis using Multimodal RAG">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>

<body>
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-chart-line logo-icon"></i>
                <span class="logo-text">FinanceRAG</span>
            </div>
        </div>
        <div class="sidebar-new-chat">
            <button class="btn-new-chat" id="newChatBtn" title="Start a new conversation"
                onclick="fetch('/api/clear-chat',{method:'POST'}).then(function(){window.location='/'}).catch(function(){window.location='/'})">
                <i class="fas fa-plus"></i>
                <span>New Chat</span>
            </button>
        </div>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
                    id="nav-chat">
                    <i class="fas fa-comments"></i>
                    <span>Chat</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('upload_page') }}"
                    class="nav-link {% if request.endpoint == 'upload_page' %}active{% endif %}" id="nav-upload">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <span>Upload</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('dashboard_page') }}"
                    class="nav-link {% if request.endpoint == 'dashboard_page' %}active{% endif %}" id="nav-dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>Dashboard</span>
                </a>
            </li>
            <li class="nav-item">
                <a href="{{ url_for('history_page') }}"
                    class="nav-link {% if request.endpoint == 'history_page' %}active{% endif %}" id="nav-history">
                    <i class="fas fa-history"></i>
                    <span>History</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <div class="status-indicator" id="api-status">
                <span class="status-dot"></span>
                <span class="status-text">Checking...</span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <header class="topbar">
            <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">
                <i class="fas fa-bars"></i>
            </button>
            <h1 class="page-title">{% block page_title %}{{ app_name }}{% endblock %}</h1>
            <div class="topbar-actions">
                <button class="btn-icon" id="themeToggle" title="Toggle theme">
                    <i class="fas fa-moon"></i>
                </button>
            </div>
        </header>
        <div class="content-area {% block content_class %}{% endblock %}">
            {% if error %}
            <div class="alert alert-error">
                <i class="fas fa-exclamation-circle"></i>
                {{ error }}
            </div>
            {% endif %}
            {% block content %}{% endblock %}
        </div>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
