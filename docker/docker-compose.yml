# Docker Compose for Multimodal RAG Finance Analyzer
# Runs backend, frontend, and nginx reverse proxy

version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: finance-analyzer-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - finance_data:/app/data
      - finance_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: finance-analyzer-frontend
    ports:
      - "5000:5000"
    environment:
      - API_BASE_URL=http://backend:8000/api
      - FLASK_ENV=production
      - FLASK_DEBUG=0
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: finance-analyzer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  finance_data:
    name: finance-analyzer-data
  finance_logs:
    name: finance-analyzer-logs
